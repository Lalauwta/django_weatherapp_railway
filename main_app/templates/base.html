<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        body {
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        nav {
            background-color: #333;
            color: #fff;
            padding: 1rem;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 1.5rem;
        }
            .container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 1rem;
            }
        .message {
            background-color: #fff;
            border-left: 4px solid #333;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
        }
        .message.success {
            background-color: #d4edda;
            border-left-color: #28a745;
            color: #155724;
        }
        .message.error,
        .message.danger {
            background-color: #f8d7da;
            border-left-color: #dc3545;
            color: #721c24;
        }
        .message.warning {
            background-color: #fff3cd;
            border-left-color: #ffc107;
            color: #856404;
        }
        .message.info {
            background-color: #d1ecf1;
            border-left-color: #17a2b8;
            color: #0c5460;
        }
        .city-form {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 2rem auto 0;
            max-width: 500px;
        }
        .city-form input[type="text"] {
            flex: 1;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.2s;
        }
        .city-form input[type="text"]:focus {
            border-color: #333;
        }
        .city-form button {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            color: #fff;
            background-color: #333;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .city-form button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <!-- navigation bar with link to home page -->

    <nav>
        <div class="container">
            <a href="{% url 'index' %}">My Weather App</a>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
            <div class="message {{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
        
    
        {% block content %}

        {% endblock %}
    </div>


</body>
</html>
